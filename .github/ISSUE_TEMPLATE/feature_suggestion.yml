name: Suggestion / Feature Request
description: Use this template to propose improvements, new features, or ideas for 0FluffStart.
title: "[Suggestion] "
labels: ["needs triage"]
assignees: []

body:
  - type: input
    id: summary
    attributes:
      label: "Summary"
      description: "Short summary of your suggestion"
      placeholder: "E.g., Add focus mode to homepage"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "Explain your suggestion in detail. Include why it's useful or how it could work."
      placeholder: "Add all relevant details, mockups, or examples here"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "0FluffStart version"
      description: "Version where you want this improvement or suggestion applied"
      placeholder: "E.g., v1.3.0"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: "Browser / Platform"
      description: "Which browser, OS, or device this suggestion is most relevant to"
      placeholder: "E.g., Chrome Desktop, Android Chrome"

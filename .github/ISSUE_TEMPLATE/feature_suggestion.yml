name: Feature/Suggestion
description: Suggest a new feature or improvement for 0FluffStart
title: "[Feature] "
labels: enhancement
body:
  - type: textarea
    id: describe
    attributes:
      label: Describe the Feature
      description: Explain your idea or suggestion in detail. You can add a screenshot or mockup if helpful.
      placeholder: "e.g., Add a focus mode that hides all UI elements except the search bar."

  - type: textarea
    id: benefits
    attributes:
      label: Benefits
      description: What problem does this solve or what benefit does it provide?
      placeholder: "e.g., Helps users concentrate without distraction."

  - type: textarea
    id: examples
    attributes:
      label: Examples / References
      description: Any reference, inspiration, or example of this feature.
      placeholder: "e.g., Similar focus mode in other dashboards or apps."

  - type: input
    id: version
    attributes:
      label: 0FluffStart Version
      description: The version you are currently using
      placeholder: "e.g., 1.1.0"

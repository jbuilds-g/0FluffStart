name: Report Bug 🐛
description: Report a bug you encountered in 0FluffStart
title: "[Bug] "
labels: bug
body:
  - type: textarea
    id: describe
    attributes:
      label: Describe the Bug
      description: Please describe the bug in detail. You can add a screenshot as well. It would be helpful.
      placeholder: "e.g., When I try to restore a backup, only quick links restore and other settings do not."

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step by step instructions to reproduce the bug. You can attach files/screenshots here.
      placeholder: "1. Go to Settings > Advanced\n2. Click Backup\n3. Restore backup\n4. Observe issue"

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "All settings should be restored correctly."

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Only quick links were restored; all other settings were missing."

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How bad is this bug?
      options:
        - Minor
        - Moderate
        - Critical

  - type: input
    id: device
    attributes:
      label: Device / Browser
      description: Device, OS, or browser where the bug occurred
      placeholder: "Pixel 9 Pro, Android 16, Chrome 111"

  - type: input
    id: app_version
    attributes:
      label: 0FluffStart Version
      description: The version you are currently using
      placeholder: "e.g., 1.1.0"

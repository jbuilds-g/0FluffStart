name: Bug Report 🐛
description: Use this template to report bugs or unexpected behavior in 0FluffStart.
title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: input
    id: summary
    attributes:
      label: "Summary"
      description: "Short summary of the bug"
      placeholder: "E.g., Quick links fail to restore after backup"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "Describe step by step how to reproduce the bug"
      placeholder: "1. Go to Settings > Backup\n2. Restore previous backup\n3. Observe quick links not restoring"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What you expected to happen"
      placeholder: "All settings including quick links should be restored"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happened"
      placeholder: "Only quick links were restored, all other settings failed"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "0FluffStart version"
      description: "The version where this bug occurred"
      placeholder: "E.g., v1.2.0"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: "Browser / Platform"
      description: "The browser, OS, or device where this bug happened"
      placeholder: "E.g., Chrome Desktop, Android Chrome"
    validations:
      required: true

  - type: input
    id: screenshot
    attributes:
      label: "n: "Provide a link to a screenshot if available to help illustrate the bug"
      placeholder: "E.g., https://imgur.com/your_screenshot.png"

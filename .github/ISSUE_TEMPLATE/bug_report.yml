name: Bug Report🐛
description: Report a bug or issue with 0FluffStart
title: "[BUG] "
labels: bug
body:
  - type: input
    id: describe
    attributes:
      label: Describe the issue
      placeholder: "Explain what went wrong. You can add a screenshot as well—it would be helpful."
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "List the steps to reproduce the bug. Screenshots/files can be added here."
      placeholder: "1. Open 0FluffStart\n2. Click on Settings\n3. Observe the issue..."
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "Explain what you expected to happen."
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: "Explain what actually happened."
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g., 1.2.0"
  - type: input
    id: additional
    attributes:
      label: Additional Context
      description: "Any other information that might help, like relevant settings or environment."
      placeholder: "Optional"
